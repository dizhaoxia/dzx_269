version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: e2ee-im-postgres
    environment:
      POSTGRES_USER: e2ee_im
      POSTGRES_PASSWORD: e2ee_im_secret
      POSTGRES_DB: e2ee_im
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2ee_im"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: e2ee-im-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
